<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>取材ライターなりきりゲーム2 〜信頼と炎上のあいだ〜</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#777;--border:#d8d8dd;--primary:#0071e3;--danger:#ff3b30;--success:#34c759;--warn:#ff9500;--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:14px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Segoe UI",sans-serif;line-height:1.6}
button{font:inherit;border:none;background:none;cursor:pointer}
.app{max-width:980px;margin:0 auto;padding-bottom:40px}
.hero{background:linear-gradient(135deg,#fff,#eef6ff);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.title-image{display:block;width:100%;max-width:100%;border-radius:14px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.lead-text{margin:0 0 14px;color:var(--muted);font-size:14px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:11px 16px;border-radius:10px;font-weight:700;font-size:14px}
.btn-primary{background:var(--primary);color:#fff}.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}.btn:active{transform:translateY(1px)}
.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px;text-align:center;min-height:70px}
.stat small{display:block;color:var(--muted);font-size:10px;font-weight:700}.stat strong{display:block;font-size:16px;margin-top:2px}
.bar{height:5px;background:#eee;border-radius:99px;overflow:hidden;margin-top:6px}.bar span{display:block;height:100%;width:0;background:#333;transition:.25s}
.blue span{background:var(--primary)}.red span{background:var(--danger)}.green span{background:var(--success)}.orange span{background:var(--warn)}
.layout{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:820px){.layout{grid-template-columns:1.7fr .9fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-head{padding:14px 16px;background:#fafafa;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px;align-items:center}
.panel-title{font-size:15px;font-weight:800}.badge{font-size:11px;color:#555;background:#f1f1f3;border:1px solid var(--border);border-radius:99px;padding:3px 8px;white-space:nowrap}
.panel-body{padding:16px}.scene-title{font-size:20px;line-height:1.35;margin:0 0 8px}.scene-text{color:var(--muted);font-size:14px;margin:0 0 14px}
.dialogue{display:flex;flex-direction:column;gap:8px;margin:12px 0}.bubble{max-width:92%;width:fit-content;padding:11px 13px;border-radius:12px;font-size:14px}
.you{align-self:flex-end;background:var(--primary);color:#fff}.guest{align-self:flex-start;background:#f2f2f4;border:1px solid var(--border)}.editor{align-self:flex-start;background:#fff7e6;border:1px solid #ffd599}.system{width:100%;max-width:100%;text-align:center;color:#666;background:#f8f8f8;border:1px dashed var(--border)}
.choices{display:flex;flex-direction:column;gap:8px}.choice{text-align:left;width:100%;padding:14px;background:#fff;border:1px solid var(--border);border-radius:12px}
.choice:active{background:#f2f7ff}.choice.disabled{opacity:.45;pointer-events:none}.choice-title{display:block;font-weight:800;font-size:15px}.choice-desc{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}.tag{font-size:10px;padding:2px 6px;border-radius:6px;background:#f4f4f5;border:1px solid var(--border);color:#666}
.list{display:flex;flex-direction:column;gap:8px}.item{border-bottom:1px solid var(--border);padding:10px 0;font-size:13px}.item:last-child{border-bottom:none}.item strong{display:block;font-size:13px}.item p{margin:3px 0 0;color:var(--muted);font-size:12px}.item.selected{background:#eff7ff;border:1px solid #bddcff;border-radius:10px;padding:10px}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.result-box{text-align:center;border:1px solid var(--border);border-radius:12px;padding:10px;background:#fff}.result-box strong{display:block;font-size:20px}.result-box small{font-size:11px;color:var(--muted)}
.comment-box{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fafafa;margin:10px 0;font-size:13px}.skill-box{display:grid;grid-template-columns:1fr 1fr;gap:8px}.skill{border:1px solid var(--border);border-radius:12px;padding:10px;background:#fff}.skill strong{font-size:13px}.skill p{margin:3px 0 0;color:var(--muted);font-size:11px}
.achievements{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px}.achieve{background:#fff8e1;border:1px solid #ffe082;color:#bf7600;padding:4px 8px;border-radius:99px;font-size:11px;font-weight:800}
.footer-reset{margin-top:18px;text-align:center}
.person-visual{
  display:flex;
  justify-content:center;
  margin:10px 0 14px;
}
.person-visual img{
  width:min(240px,72vw);
  max-height:360px;
  object-fit:contain;
  border-radius:16px;
  background:linear-gradient(180deg,#fff,#f2f7ff);
  border:1px solid var(--border);
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}
.person-card-img{
  width:86px;
  height:110px;
  object-fit:contain;
  float:right;
  margin-left:10px;
  margin-bottom:4px;
  border-radius:12px;
  background:#f7f9ff;
  border:1px solid var(--border);
}
.choice::after{content:"";display:block;clear:both}
@media(max-width:420px){
  .person-card-img{width:70px;height:92px}
  .person-visual img{width:min(210px,78vw);max-height:310px}
}

@media(max-width:420px){body{padding:10px}.hud{grid-template-columns:repeat(2,1fr)}.hero{padding:10px}.btn{width:100%}.row{flex-direction:column}}

button,.choice,.btn{
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
}
.choice{
  position:relative;
  z-index:2;
}
.choice *{
  pointer-events:none;
}
.person-visual img,.person-card-img,.title-image{
  pointer-events:none;
}


.hero{position:relative;z-index:5}
.top-actions,.row{position:relative;z-index:20}
#startBtn,#howBtn,#resetBtn{
  position:relative;
  z-index:30;
  pointer-events:auto;
  touch-action:manipulation;
}

</style>
</head>
<body>
<div class="app">
<header class="hero">
  <img src="title.png" alt="取材ライターなりきりゲーム2" class="title-image">
  <p class="lead-text">企画、準備、質問、メモ選び、切り口、タイトル、掲載前確認。読まれる記事と、相手を傷つけない記事。そのあいだで判断する取材ライター体験ゲームです。</p>
  <div class="row"><button class="btn btn-primary" id="startBtn">ゲーム開始</button><button class="btn btn-outline" id="howBtn">遊び方</button></div>
</header>

<section class="hud">
  <div class="stat"><small>記事</small><strong id="articleNum">1/5</strong></div>
  <div class="stat"><small>質問</small><strong id="questionNum">0/5</strong></div>
  <div class="stat"><small>締切</small><strong id="deadlineStat">100</strong><div class="bar orange"><span id="deadlineBar"></span></div></div>
  <div class="stat"><small>体力</small><strong id="staminaStat">100</strong><div class="bar green"><span id="staminaBar"></span></div></div>
  <div class="stat"><small>予算</small><strong id="budgetStat">100</strong><div class="bar blue"><span id="budgetBar"></span></div></div>
  <div class="stat"><small>信頼</small><strong id="trustStat">0</strong><div class="bar blue"><span id="trustBar"></span></div></div>
  <div class="stat"><small>深掘り</small><strong id="depthStat">0</strong><div class="bar"><span id="depthBar"></span></div></div>
  <div class="stat"><small>PV力</small><strong id="readStat">0</strong><div class="bar"><span id="readBar"></span></div></div>
  <div class="stat"><small>正確性</small><strong id="accuracyStat">0</strong><div class="bar green"><span id="accuracyBar"></span></div></div>
  <div class="stat"><small>炎上</small><strong id="riskStat">0</strong><div class="bar red"><span id="riskBar"></span></div></div>
</section>

<main class="layout">
<section class="panel">
  <div class="panel-head"><div class="panel-title" id="phaseTitle">編集部</div><div class="badge" id="phaseBadge">待機中</div></div>
  <div class="panel-body"><div id="scene"></div><div class="choices" id="choices"></div><div class="footer-reset"><button class="btn btn-outline" id="resetBtn">最初から</button></div></div>
</section>
<aside>
  <section class="panel" style="margin-bottom:12px;"><div class="panel-head"><div class="panel-title">取材メモ</div><div class="badge" id="materialCount">0件</div></div><div class="panel-body"><div class="list" id="materials"></div></div></section>
  <section class="panel" style="margin-bottom:12px;"><div class="panel-head"><div class="panel-title">ライタースキル</div><div class="badge" id="skillPointBadge">0P</div></div><div class="panel-body"><div class="skill-box" id="skills"></div></div></section>
  <section class="panel"><div class="panel-head"><div class="panel-title">公開記事</div><div class="badge" id="publishedCount">0本</div></div><div class="panel-body"><div class="list" id="publishedList"></div></div></section>
</aside>
</main>
</div>

<script>
const MAX_ARTICLES=5,MAX_QUESTIONS=5,PREP_COUNT=2,USE_MATERIAL_COUNT=3;

const prompts=[
 {theme:"プロの矜持",editor:"職人や経営者の『こだわり』に迫れ。上辺だけの美談はいらない。",candidates:["ramen","it","zoo"]},
 {theme:"挫折と再生",editor:"失敗からどう立ち上がったかを掘れ。きれいごとより、リアルな葛藤が読みたい。",candidates:["it","game","ramen"]},
 {theme:"愛される理由",editor:"なぜそこに人が集まるのか。愛される秘密を、現場の声から紐解いてこい。",candidates:["zoo","book","idol"]},
 {theme:"誰かを支える仕事",editor:"目立たないけど、誰かの生活を支えている人を取材してこい。数字よりも現場の温度だ。",candidates:["care","farmer","book"]},
 {theme:"未来をつくる人",editor:"まだ大きく知られていないが、未来を変えようとしている人を探せ。夢だけでなく、現実の壁も聞いてこい。",candidates:["game","farmer","idol"]}
];

const planTypes=[
 {id:"profile",name:"人物密着型",desc:"相手の人生や価値観に寄り添う。信頼と深掘りが伸びやすい。",effects:{trust:8,depth:8,read:-1,accuracy:2,risk:-2,deadline:-8,stamina:-5,budget:0},tags:["信頼+","深掘り+"]},
 {id:"issue",name:"課題提起型",desc:"個人の話を社会や時代のテーマにつなげる。正確性が重要。",effects:{trust:1,depth:5,read:4,accuracy:8,risk:3,deadline:-10,stamina:-4,budget:-4},tags:["正確性+","重厚"]},
 {id:"buzz",name:"バズ狙い型",desc:"読まれる切り口で攻める。PVは伸びるが、信頼を削りやすい。",effects:{trust:-3,depth:0,read:14,accuracy:-2,risk:8,deadline:-4,stamina:-2,budget:0},tags:["PV+","炎上注意"]}
];

const prepOptions=[
 {id:"past",name:"過去の記事を読む",desc:"相手の背景を知り、重複質問を避ける。",effects:{trust:6,depth:4,accuracy:4,risk:-2,deadline:-10,stamina:-4,budget:0},tags:["信頼+","時間消費"]},
 {id:"sns",name:"SNS・口コミを見る",desc:"最近の話題や読者の入口を探る。",effects:{trust:-1,read:8,accuracy:1,risk:3,deadline:-7,stamina:-3,budget:0},tags:["PV+","炎上注意"]},
 {id:"data",name:"データ調査・現地体験",desc:"数字を調べたり、客として体験する。",effects:{trust:2,depth:3,read:2,accuracy:10,risk:-3,deadline:-14,stamina:-8,budget:-15},tags:["正確性++","予算消費"]},
 {id:"questions",name:"質問リストを作り込む",desc:"取材が安定する。予定調和には注意。",effects:{trust:4,depth:2,read:-1,accuracy:5,risk:-2,deadline:-8,stamina:-5,budget:0},tags:["安定"]},
 {id:"blank",name:"あえて余白を残す",desc:"偶然の会話を拾いやすいが、準備不足にもなる。",effects:{depth:5,read:5,accuracy:-4,risk:5,deadline:-3,stamina:-1,budget:0},tags:["偶然","リスク"]}
];

function q(id,type,text,note,kind,e){return {id,type,q:text,note,kind,effects:e}}
function mkPerson(id,name,intro,first,landmines,questions,angles,titles){return {id,name,intro,first,landmines,questions,angles,titles}}

const commonAngles={
 docu:[
  {id:"human",name:"人物の人生を丁寧に描く",desc:"信頼と深掘りを活かす王道記事。",effects:{trust:6,depth:7,read:4,risk:-3}},
  {id:"social",name:"現場の課題として描く",desc:"社会性が出る。正確性が重要。",effects:{accuracy:8,depth:6,read:5,risk:2}},
  {id:"gap",name:"意外な素顔で読ませる",desc:"読まれやすいが、軽く扱うと危険。",effects:{read:10,trust:1,risk:4}}
 ]
};

const people={
 ramen:mkPerson("ramen","ラーメン屋の店主","豚骨を24時間煮込む職人気質の店主。口は悪いが常連に愛されている。","取材？ ラーメン伸びる前に早くしてくれ。",["利益","儲かって","映え"],[
  q("r1","safe","スープのこだわりを教えてください。","豚骨を24時間煮込む狂気のこだわり","craft",{trust:4,read:2,stamina:-5,deadline:-5}),
  q("r2","empathy","なぜこの街でお店を始めたんですか？","亡き妻と出会った思い出の街だから","heart",{trust:6,depth:6,stamina:-7,deadline:-7}),
  q("r3","funny","休日は何をされているんですか？","実は可愛いスイーツ巡りが大好き","gap",{trust:2,read:7,stamina:-4,deadline:-4}),
  q("r4","sharp","ぶっちゃけ利益は出ていますか？","材料費の高騰で利益がほぼ無い","issue",{trust:-4,depth:5,risk:4,accuracy:4,stamina:-8,deadline:-6}),
  q("r5","third","常連さんはどんな方々ですか？","親子3代で通ってくれる客がいる","third",{accuracy:8,trust:4,depth:3,stamina:-5,deadline:-5}),
  q("r6","deep","修行時代で一番苦しかったことは？","師匠に毎日怒鳴られ鍋を洗う日々","conflict",{depth:8,trust:3,stamina:-9,deadline:-7}),
  q("r7","respect","店主にとって、この味を守る意味は？","体が動く限り、この一杯を守り抜く覚悟","quote",{trust:10,depth:5,stamina:-6,deadline:-6})
 ],commonAngles.docu,[
  {id:"honest",text:"地元に愛される一杯の秘密",effects:{trust:6,depth:4,read:5,risk:-3}},
  {id:"quote",text:"24時間煮込む情熱のスープ、その裏側",effects:{trust:3,depth:6,read:9,risk:1}},
  {id:"click",text:"頑固店主と可愛いスイーツの意外すぎる関係",effects:{trust:-6,depth:0,read:17,risk:13}}
 ]),
 it:mkPerson("it","若手IT起業家","鋭い言葉で本質を突く若手起業家。厳しいが、根には熱い思いがある。","時間は5分。要件を手短に頼むよ。",["意識高い","裏切り","炎上"],[
  q("i1","safe","起業のきっかけを教えてください。","社会の非効率への強烈な怒り","issue",{trust:3,read:4,accuracy:2,stamina:-5,deadline:-5}),
  q("i2","respect","経営者として一番大切にしている考えは？","浅い思考は、誰かの時間を奪う","quote",{trust:8,depth:5,stamina:-6,deadline:-6}),
  q("i3","deep","最大の失敗は何でしたか？","創業期に右腕が離脱し、組織が崩れかけた","conflict",{depth:10,trust:2,risk:3,stamina:-10,deadline:-8}),
  q("i4","empathy","社員にはどんな思いで接していますか？","厳しい言葉の裏に、成長への願いがある","heart",{trust:6,depth:6,stamina:-7,deadline:-6}),
  q("i5","funny","休日は何をしているんですか？","サウナでひたすら思考を整理している","gap",{trust:3,read:6,stamina:-4,deadline:-4}),
  q("i6","scene","5年後の野望は？","5年以内に世界シェアを取りにいく","future",{depth:4,read:7,stamina:-6,deadline:-5}),
  q("i7","sharp","『意識高い系』と言われることについてどう思いますか？","ラベルを貼る人ほど、自分の問いから逃げている","quote",{trust:-5,risk:8,read:10,stamina:-8,deadline:-6})
 ],commonAngles.docu,[
  {id:"honest",text:"若き起業家が語る、失敗と再起のリアル",effects:{trust:6,depth:6,read:7,risk:-2}},
  {id:"quote",text:"浅い思考は、誰かの時間を奪う",effects:{trust:3,depth:8,read:11,risk:2}},
  {id:"click",text:"右腕の離脱を越えた若きカリスマの真実",effects:{trust:-5,depth:4,read:16,risk:12}}
 ]),
 zoo:mkPerson("zoo","動物園の園長","赤字続きでも、動物への愛だけは誰にも負けない園長。","ごめんなさい、今エサの準備中で！",["赤字","客寄せ","かわいそう"],[
  q("z1","safe","一番人気の動物は？","いつも寝てばかりの怠け者のクマ","gap",{trust:4,read:5,stamina:-4,deadline:-4}),
  q("z2","empathy","動物と心が通じる瞬間はありますか？","目を見れば、何を言いたいか分かる瞬間がある","heart",{trust:7,depth:5,stamina:-7,deadline:-6}),
  q("z3","sharp","ぶっちゃけ経営は順調ですか？","赤字続きだが、エサ代だけは絶対に削らない","issue",{trust:-2,depth:7,risk:2,accuracy:4,stamina:-8,deadline:-6}),
  q("z4","third","来園者から印象に残った言葉は？","子どもが『また会いに来るね』と動物に手を振った","third",{accuracy:7,depth:4,trust:4,stamina:-5,deadline:-5}),
  q("z5","funny","園長の推し動物は？","実はバックヤードにいる野良猫","gap",{trust:5,read:6,stamina:-4,deadline:-4}),
  q("z6","respect","動物に教わったことは？","ありのままに生きる強さ","quote",{trust:8,depth:6,stamina:-6,deadline:-6}),
  q("z7","scene","この動物園の夢は何ですか？","動物と人間が、静かに共存できる場所にしたい","future",{depth:5,read:4,trust:3,stamina:-6,deadline:-5})
 ],commonAngles.docu,[
  {id:"honest",text:"目を見れば分かる。園長と動物たちの絆",effects:{trust:6,depth:5,read:6,risk:-2}},
  {id:"quote",text:"赤字でもエサ代は削らない、その覚悟",effects:{trust:4,depth:7,read:9,risk:1}},
  {id:"click",text:"怠け者クマと熱血園長のゆるすぎる毎日",effects:{trust:-2,depth:2,read:14,risk:5}}
 ]),
 book:mkPerson("book","古本屋の店主","商店街の片隅で古本屋を続ける店主。売上は厳しいが、本と人の記憶を大切にしている。","取材ですか。大きな話はありませんよ。本が、ここにあるだけです。",["売れない","閉店","時代遅れ"],[
  q("b1","safe","このお店は何年続いているんですか？","祖父の代から続く小さな古本屋","craft",{trust:4,accuracy:3,stamina:-4,deadline:-4}),
  q("b2","empathy","忘れられないお客さんはいますか？","亡くなった父の本を探しに来た青年がいた","heart",{trust:7,depth:7,stamina:-7,deadline:-6}),
  q("b3","sharp","正直、古本屋は今の時代きびしいですか？","売上は落ちているが、店を閉める決心はつかない","issue",{trust:-3,depth:7,risk:4,accuracy:4,stamina:-8,deadline:-6}),
  q("b4","funny","店主の推し本を一冊だけ選ぶなら？","誰にも売りたくないほど好きな詩集がある","gap",{trust:4,read:6,stamina:-4,deadline:-4}),
  q("b5","third","常連さんはどんな方が多いですか？","毎週来て、一冊も買わずに話だけして帰る老人がいる","third",{trust:4,accuracy:7,depth:4,stamina:-5,deadline:-5}),
  q("b6","respect","本を売る仕事の一番大切なところは？","本ではなく、その人の時間を手渡している","quote",{trust:9,depth:6,stamina:-6,deadline:-6}),
  q("b7","scene","この店をこれからどうしていきたいですか？","子どもがふらっと入れる場所として残したい","future",{trust:5,depth:5,read:3,stamina:-6,deadline:-5})
 ],commonAngles.docu,[

 state.deadline=85;state.stamina=85;state.budget=85;state.materials=[];state.selectedMaterialIdx=[];state.selectedAngle=null;state.selectedTitle=null;state.askedQuestions=[];

function apply(e){if(!e)return;["trust","depth","read","accuracy","risk","deadline","stamina","budget"].forEach(k=>state[k]=clamp(state[k]+(e[k]||0)))}
function scene(title,text,message="",extra=""){el.scene.innerHTML=`<h2 class="scene-title">${title}</h2><p class="scene-text">${text}</p>${extra}${message?`<div class="dialogue">${message}</div>`:""}`}
function choices(items){
 el.choices.innerHTML=items.map((item,i)=>`<button type="button" class="choice ${item.disabled?"disabled":""}" data-i="${i}"><span class="choice-title">${item.name}</span>${item.desc?`<span class="choice-desc">${item.desc}</span>`:""}${item.tags?`<span class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</span>`:""}</button>`).join("");

 const runAction=(btn,ev)=>{
  if(!btn||btn.classList.contains("disabled"))return;
  const i=Number(btn.dataset.i);
  const item=items[i];
  if(!item||typeof item.action!=="function")return;
  if(ev)ev.preventDefault();
  item.action();
 };

 [...el.choices.querySelectorAll("button")].forEach((btn)=>{
  btn.addEventListener("click",(ev)=>runAction(btn,ev),{passive:false});
  btn.addEventListener("touchend",(ev)=>runAction(btn,ev),{passive:false});
 });
}

function reverseEffects(e){const r={};Object.keys(e).forEach(k=>r[k]=-e[k]);return r}
function togglePrep(p){const idx=state.preps.findIndex(x=>x.id===p.id);if(idx>=0){state.preps.splice(idx,1);apply(reverseEffects(p.effects))}else{if(state.preps.length>=PREP_COUNT)return;state.preps.push(p);apply(p.effects)}choosePreps()}

function canSeeLandmineHint(){

function askQuestion(){
 if(state.questionIndex>=MAX_QUESTIONS){selectMaterials();return}
 el.phaseTitle.textContent=`質問 ${state.questionIndex+1}/${MAX_QUESTIONS}`;el.phaseBadge.textContent="取材中";
 let warning="";if(state.stamina<=25)warning+=`<div class="bubble system">体力が少なく、深い質問の精度が落ちそうです。</div>`;if(state.deadline<=25)warning+=`<div class="bubble system">締切が迫っています。聞き漏らしに注意。</div>`;
 scene("何を聞く？","相手の様子、ここまでの流れ、そして記事の方針を考えて質問を選ぼう。",`${characterImg(state.person.id)}${warning}`);
 const available=state.person.questions.filter(q=>!state.askedQuestions.includes(q.id));
 choices(available.map(q=>({name:q.q,desc:questionHint(q),tags:[q.type==="sharp"?"鋭い質問":"質問",(isLandmine(q)&&canSeeLandmineHint())?"地雷注意":""].filter(Boolean),action:()=>selectQuestion(q)})));

}
function questionHint(q){if(q.type==="sharp")return"本音が聞ける可能性もあるが、関係が崩れる危険もある。";if(q.type==="empathy")return"信頼が高いほど、深い話につながりやすい。";if(q.type==="funny")return"場が和むこともあるが、滑ることもある。";if(q.type==="third")return"第三者の声は記事の説得力を上げる。";if(q.type==="respect")return"相手への敬意が伝わりやすい。";return"基本的な質問。空気を整えやすい。"}
function isLandmine(q){return state.person.landmines.some(word=>q.q.includes(word))}
function selectQuestion(q){
 state.questionIndex++;state.askedQuestions.push(q.id);
 const res=evaluateQuestion(q);apply(res.effects);if(checkCriticalGameOver("質問対応で危険値に到達しました。"))return;
 if(res.getMemo)state.materials.push({text:res.memoText,kind:q.kind,kindLabel:kindLabel(q.kind),used:false});
 if(state.questionIndex<MAX_QUESTIONS&&Math.random()<0.30){

function bindTap(button,action){
 if(!button)return;
 let lock=false;
 const run=(e)=>{
  if(e){e.preventDefault();e.stopPropagation();}
  if(lock)return;
  lock=true;
  action();
  setTimeout(()=>{lock=false;},250);
 };

 button.addEventListener("pointerup",run,{passive:false});

}
